# UltraFeedback Binarized Epsilon DPO example config (SimPO base-style splits).
policy_name: princeton-nlp/Llama-3-Base-8B-SFT
ref_name: princeton-nlp/Llama-3-Base-8B-SFT
precision: bf16

dataset:
  preference_source: ultrafeedback_binarized
  dataset_name: HuggingFaceH4/ultrafeedback_binarized
  generated_data: false
  chat_template: true
  chat_template_name: llama3
  train_split: train_prefs
  eval_split: test_prefs
  max_len: 2048

dpo_training:
  epochs: 1
  batch_size: 4
  eval_batch_size: 4
  learning_rate: 5e-7
  log_steps: 5
  eval_steps: 100
  save_steps: 100
  gradient_accumulation: 4
  max_grad_norm: 1.0
  warmup_steps: 60
  gradient_checkpointing: true
  wandb_project: e_dpo
  report: null
  run_name: ultrafeedback-base-e-dpo
  hub_model_id: null
  save_dir: e_dpo_ultrafeedback_checkpoints
  save_strategy: steps
  load_best_model_at_end: false
  metric_for_best_model: eval_loss
  greater_is_better: false
  save_total_limit: 1
  save_only_model: false
  fsdp:
    enabled: true
    mode: full_shard auto_wrap
    version: 1
    offload_params: false
    auto_wrap_policy: transformer_based_wrap
    transformer_layer_cls_to_wrap: null
    min_num_params: null
    backward_prefetch: no_prefetch
    forward_prefetch: false
    use_orig_params: true
    cpu_ram_efficient_loading: true
    sync_module_states: true
    activation_checkpointing: false
    state_dict_type: SHARDED_STATE_DICT

e_dpo:
  beta: 0.1
  epsilon: 0.01
