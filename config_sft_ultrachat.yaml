policy_name: meta-llama/Meta-Llama-3-8B
precision: bf16

dataset:
  dataset_name: HuggingFaceH4/ultrachat_200k
  subset: train_sft
  eval_subset: test_sft
  val_ratio: 0.1
  seed: 42

sft_training:
  learning_rate: 2e-5
  batch_size: 8
  eval_batch_size: 8
  gradient_accumulation: 16
  epochs: 1
  log_steps: 10
  eval_steps: 500
  save_steps: 500
  save_strategy: best
  load_best_model_at_end: true
  metric_for_best_model: eval_loss
  greater_is_better: false
  save_total_limit: 2
  warmup_ratio: 0.1
  lr_scheduler_type: cosine
  max_length: 2048
  packing: true
  completion_only_loss: false
  wandb_project: ultrachat-llama3-8b-sft
  run_name: ultrachat200k-sft
  save_dir: sft_ultrachat_model
  save_only_model: true
  push_to_hub: false
  hub_model_id: null
  fsdp:
    enabled: false
    mode: full_shard auto_wrap
    version: 1
    offload_params: false
    auto_wrap_policy: transformer_based_wrap
    transformer_layer_cls_to_wrap: null
    min_num_params: null
    backward_prefetch: no_prefetch
    forward_prefetch: false
    use_orig_params: true
    cpu_ram_efficient_loading: true
    sync_module_states: true
    activation_checkpointing: false
    state_dict_type: FULL_STATE_DICT
