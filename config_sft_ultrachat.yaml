policy_name: meta-llama/Meta-Llama-3-8B
precision: bf16

dataset:
  dataset_name: HuggingFaceH4/ultrachat_200k
  subset: train_sft
  eval_subset: test_sft
  val_ratio: 0.1
  seed: 42

sft_training:
  learning_rate: 2e-5
  batch_size: 8
  eval_batch_size: 8
  gradient_accumulation: 16
  epochs: 1
  log_steps: 10
  eval_steps: 500
  save_steps: 500
  warmup_ratio: 0.1
  lr_scheduler_type: cosine
  max_length: 2048
  packing: true
  completion_only_loss: false
  wandb_project: ultrachat-llama3-8b-sft
  run_name: ultrachat200k-sft
  save_dir: sft_ultrachat_model
  save_only_model: true
  push_to_hub: false
  hub_model_id: null
