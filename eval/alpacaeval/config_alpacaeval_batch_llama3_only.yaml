        use_custom_chat_template: false

  - model_name_or_path: W-61/ultrafeedback-llama3-8b-beta-dpo
    pretty_name: ultrafeedback-llama3-8b-beta-dpo
    overrides:
      alpacaeval:
        use_custom_chat_template: false

  - model_name_or_path: W-61/ultrachat-llama-3-8b-sft
